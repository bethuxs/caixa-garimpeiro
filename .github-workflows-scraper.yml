name: Garimpeiro de Imóveis - Execução Periódica

# ============================================================================
# GitHub Actions Workflow - Garimpeiro de Imóveis
# ============================================================================
#
# Este workflow executa o scraper periodicamente via GitHub Actions.
# É uma alternativa a rodar localmente se você usar GitHub.
#
# Requisitos:
# 1. Repositório público ou privado no GitHub
# 2. Secrets configurados no repositório:
#    - TELEGRAM_TOKEN
#    - TELEGRAM_CHAT_ID
#
# Como usar:
# 1. Copie este arquivo para .github/workflows/scraper.yml
# 2. Vá em Settings > Secrets and variables > Actions
# 3. Adicione:
#    - Name: TELEGRAM_TOKEN, Value: seu_token
#    - Name: TELEGRAM_CHAT_ID, Value: seu_chat_id
# 4. Faça push para ativar workflow
#
# ============================================================================

on:
  # Executar em horários específicos
  schedule:
    # A cada 1 hora (6 vezes por dia)
    - cron: '0 * * * *'
    
    # Alternativamente, descomente uma das opções abaixo:
    # A cada 30 minutos
    # - cron: '*/30 * * * *'
    
    # A cada 6 horas
    # - cron: '0 */6 * * *'
    
    # Diariamente às 9 AM (UTC)
    # - cron: '0 9 * * *'
    
    # Segunda a Sexta às 8 AM
    # - cron: '0 8 * * 1-5'
  
  # Permitir disparo manual
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest
    
    name: Executar Garimpeiro
    
    timeout-minutes: 30
    
    steps:
      # Step 1: Checkout do repositório
      - name: Checkout código
        uses: actions/checkout@v4
      
      # Step 2: Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # Step 3: Instalar dependências
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      
      # Step 4: Criar arquivo .env com secrets
      - name: Configurar variáveis de ambiente
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBUG: 'false'
        run: |
          cat > .env << EOF
          TELEGRAM_TOKEN=$TELEGRAM_TOKEN
          TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
          DEBUG=$DEBUG
          EOF
      
      # Step 5: Executar scraper
      - name: Executar scraper
        run: python scraper.py
        continue-on-error: true
      
      # Step 6: Upload de logs
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: scraper-logs-${{ github.run_number }}
          path: scraper.log
          retention-days: 7
      
      # Step 7: Upload do banco de dados (backup)
      - name: Upload banco de dados
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: database-backup-${{ github.run_number }}
          path: database.db
          retention-days: 30
      
      # Step 8: Notificar sucesso
      - name: Notificar sucesso
        if: success()
        run: echo "✓ Scraper executado com sucesso!"
      
      # Step 9: Notificar falha
      - name: Notificar falha
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Erro ao executar scraper'
            })

# ============================================================================
# Notas:
#
# 1. Cron no GitHub Actions usa UTC
#    Adicione offset se necessário (UTC-3 para Brasília)
#    0 9 * * * = 12:00 (UTC) = 9:00 (UTC-3) na manhã de São Paulo
#
# 2. Limites de execução gratuita:
#    - 2000 minutos/mês para repositórios privados
#    - Unlimited para repositórios públicos
#
# 3. Apenas o arquivo database.db é mantido entre execuções
#    com Upload/Download Artifacts
#
# 4. Recomenda-se armazenar database.db em um storage externo
#    (AWS S3, Google Drive, etc.) para persistência real
#
# 5. Para mais info: https://docs.github.com/en/actions
#
# ============================================================================
